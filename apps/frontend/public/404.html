<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/catalogo_test/HUMO_LOGO_negro_transparente.svg"
    />
    <link rel="shortcut icon" href="/catalogo_test/HUMO_LOGO_negro_transparente.svg" />
    <link
      rel="mask-icon"
      href="/catalogo_test/HUMO_LOGO_negro_transparente.svg"
      color="#000000"
    />
    <meta name="theme-color" content="#eef1f0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HUMO</title>
    <script>
      (function () {
        var repositoryBase = '/catalogo_test';
        var currentPath = window.location.pathname;
        var relativePath = currentPath.indexOf(repositoryBase) === 0
          ? currentPath.slice(repositoryBase.length)
          : currentPath;

        var redirectTarget =
          repositoryBase +
          '/?p=' +
          encodeURIComponent(relativePath || '/') +
          '&q=' +
          encodeURIComponent(window.location.search.slice(1)) +
          '&h=' +
          encodeURIComponent(window.location.hash.slice(1));

        window.location.replace(redirectTarget);
      })();
    </script>
  </head>
  <body></body>
</html>
